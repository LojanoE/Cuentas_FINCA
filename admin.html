<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Cuentas FINCA</title>
  <link rel="stylesheet" href="css/styles.css?v=2">
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>🏡 Cuentas FINCA</h1>
        <div class="user-info">Panel de administración • <span id="adminEmail"></span></div>
      </div>
      <button id="logoutBtn" class="btn btn-danger">Cerrar sesión</button>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
        <h2>Trabajadores</h2>
        <button id="openWorkerModal" class="btn btn-primary">+ Nuevo trabajador</button>
      </div>
      <ul id="workerList" class="worker-list"></ul>
      <div id="workerMessage" class="message hidden"></div>
    </div>
  </div>

  <!-- Modal: Nuevo trabajador -->
  <div id="workerModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Nuevo trabajador</h2>
        <button class="close-btn" onclick="closeWorkerModal()">&times;</button>
      </div>
      <form id="workerForm">
        <div class="form-group">
          <label for="wName">Nombre completo</label>
          <input type="text" id="wName" required>
        </div>
        <div class="form-group">
          <label for="wUsername">Usuario</label>
          <input type="text" id="wUsername" required placeholder="usuario único">
        </div>
        <div class="form-group">
          <label for="wPassword">Contraseña</label>
          <input type="password" id="wPassword" required minlength="4">
        </div>
        <div class="form-group">
          <label for="wPhone">Número de celular (para WhatsApp)</label>
          <input type="tel" id="wPhone" required placeholder="Ej: 573001234567">
          <small style="color:#666;">Incluye el código de país sin + ni espacios.</small>
        </div>
        <div class="form-group">
          <label for="wNotes">Notas (opcional)</label>
          <textarea id="wNotes"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Crear trabajador</button>
      </form>
      <div id="workerFormMessage" class="message hidden"></div>
    </div>
  </div>

  <!-- Modal: Detalle del trabajador + adelantos -->
  <div id="detailModal" class="modal-overlay">
    <div class="modal" style="max-width: 700px;">
      <div class="modal-header">
        <h2 id="detailName">Trabajador</h2>
        <button class="close-btn" onclick="closeDetailModal()">&times;</button>
      </div>

      <p>Saldo total: <span id="detailBalance" class="balance-big">$0</span></p>

      <div class="form-group">
        <button id="whatsappBtn" class="btn btn-primary btn-small">📱 Avisar por WhatsApp</button>
      </div>

      <h3>Agregar adelanto</h3>
      <form id="advanceForm">
        <input type="hidden" id="detailWorkerId">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
          <div class="form-group">
            <label for="aDate">Fecha</label>
            <input type="date" id="aDate" required>
          </div>
          <div class="form-group">
            <label for="aAmount">Valor ($)</label>
            <input type="number" id="aAmount" required min="1" step="0.01">
          </div>
        </div>
        <div class="form-group">
          <label for="aConcept">Concepto</label>
          <input type="text" id="aConcept" required placeholder="Ej: Adelanto semana 1">
        </div>
        <button type="submit" class="btn btn-primary">Guardar adelanto</button>
      </form>
      <div id="advanceFormMessage" class="message hidden"></div>

      <h3 style="margin-top:25px;">Historial de adelantos</h3>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Concepto</th>
              <th class="text-right">Valor</th>
            </tr>
          </thead>
          <tbody id="advancesTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module" src="js/firebase-config.js?v=2"></script>
  <script type="module" src="js/auth.js?v=2"></script>
  <script type="module" src="js/admin.js?v=2"></script>
</body>
</html>
