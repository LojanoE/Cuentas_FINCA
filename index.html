<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuentas FINCA - Iniciar sesión</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <div class="card login-card">
      <h1>🏡 Cuentas FINCA</h1>
      <p class="subtitle">Control de adelantos del personal</p>

      <!-- Selector de tipo de usuario -->
      <div class="form-group" style="text-align:left;">
        <label>Tipo de usuario</label>
        <select id="userType" class="btn-block">
          <option value="admin">Soy administrador</option>
          <option value="worker">Soy trabajador</option>
        </select>
      </div>

      <!-- Formulario admin -->
      <form id="adminLoginForm">
        <div class="form-group">
          <label for="adminEmail">Correo electrónico</label>
          <input type="email" id="adminEmail" required placeholder="admin@finca.com">
        </div>
        <div class="form-group">
          <label for="adminPassword">Contraseña</label>
          <input type="password" id="adminPassword" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Iniciar sesión</button>
      </form>

      <!-- Formulario trabajador -->
      <form id="workerLoginForm" class="hidden">
        <div class="form-group">
          <label for="workerUsername">Usuario</label>
          <input type="text" id="workerUsername" required placeholder="usuario123">
        </div>
        <div class="form-group">
          <label for="workerPassword">Contraseña</label>
          <input type="password" id="workerPassword" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Iniciar sesión</button>
      </form>

      <div id="message" class="message hidden"></div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
